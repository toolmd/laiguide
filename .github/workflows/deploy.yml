name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# One deploy at a time. Each admin save makes two commits (saveMed + appendChangelog),
# which would otherwise trigger two parallel deploys that race and one fails.
# cancel-in-progress: false queues the second run so both changes land cleanly.
concurrency:
    group: deploy
    cancel-in-progress: false

jobs:
    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Inject runtime token
              env:
                  ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
              run: |
                  node -e "
                    const k = 0x5a;
                    const raw = process.env.ADMIN_PAT || '';
                    const enc = raw ? Buffer.from([...raw].map(c => c.charCodeAt(0) ^ k)).toString('base64') : '';
                    require('fs').writeFileSync('dist/admin-rt.js', 'window.__ADMIN_TOKEN__=' + JSON.stringify(enc) + ';');
                  "

            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist/

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4

            - name: Cache Playwright browsers + system deps
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: |
                      ~/.cache/ms-playwright
                      /var/cache/apt
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers + system deps
              run: ./node_modules/.bin/playwright install --with-deps chromium

            - name: Post-deploy smoke test (live URL)
              continue-on-error: true
              env:
                  PLAYWRIGHT_BASE_URL: ${{ steps.deployment.outputs.page_url }}
              run: ./node_modules/.bin/playwright test e2e/deploy-smoke.spec.ts --project=chromium
