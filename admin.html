        <title>Admin Portal</title>
        <link
            rel="icon"
            id="favicon"
            type="image/png"
            href="./assets/logo-desc-DqcXQLlW-DqcXQLlW-DqcXQLlW.png"
        />
        <script>
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = c.height = 64;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#3c8476';
                ctx.fillRect(0, 0, 64, 64);
                ctx.drawImage(img, 0, 0, 64, 64);
                document.getElementById('favicon').href = c.toDataURL('image/png');
            };
            img.src = './media/logo-desc.png';
        </script>

    <body>
        <div class="admin-header">
            <img src="./assets/logo-desc-DqcXQLlW-DqcXQLlW-DqcXQLlW.png" alt="DESC logo" class="admin-header-logo" />
            <h1>Admin Portal</h1>
        </div>

        <div class="admin-container">
            <!-- Login -->
            <div id="login-section">
                <label for="email-input">Email</label>
                <input type="email" id="email-input" autocomplete="email" />
                <label for="code-input">Access Code</label>
                <input type="password" id="code-input" autocomplete="off" />
                <button id="login-btn">Sign In</button>
                <div id="login-error"></div>
            </div>

            <!-- Editor (hidden until authenticated) -->
            <div id="editor-section">
                <div class="user-bar">
                    <span id="user-email"></span>
                    <button id="logout-btn">Sign Out</button>
                </div>
                <span id="top-status" style="display: block; text-align: center; font-size: 13px; padding: 4px 0;"></span>

                <div class="editor-toolbar">
                    <select id="med-select">
                        <option value="">Select a medication…</option>
                    </select>
                    <button id="save-btn">Save</button>
                    <button id="delete-btn">Delete</button>
                    <button id="toggle-json-btn" type="button" style="display: none">JSON View</button>
                </div>

                <!-- Structured form editor -->
                <div id="form-editor"></div>

                <!-- Raw JSON editor (hidden by default) -->
                <div id="json-section" style="display: none">
                    <textarea id="json-editor" spellcheck="false"></textarea>
                </div>

                <div id="deploy-status" style="margin-top: 8px; font-size: 13px; color: #555"></div>
            </div>
        </div>
        <p style="text-align: center; margin-top: 1rem">
            <a href="./index.html" style="color: #1a5c3a; text-decoration: none">Clinical Tool</a>
            &nbsp;&nbsp;
            <a href="./changelog.html" style="color: #1a5c3a; text-decoration: none">Change Log</a>
        </p>
